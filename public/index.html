<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Insight | BMW M Style Analysis</title>
    <meta name="description" content="AI 기반 감성 분석 서비스 - BMW M 브랜드의 강렬하고 시크한 디자인">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="m-stripe">
                <div class="stripe-blue"></div>
                <div class="stripe-dark-blue"></div>
                <div class="stripe-red"></div>
            </div>
            <h1>AI SENTIMENT <span class="highlight">INSIGHT</span></h1>
            <p class="subtitle">UNLEASH THE POWER OF EMOTIONAL INTELLIGENCE</p>
        </header>

        <!-- Main Section -->
        <main>
            <section class="hero">
                <div class="input-wrapper">
                    <label for="sentiment-input">ENTER YOUR THOUGHTS</label>
                    <textarea id="sentiment-input" placeholder="분석하고 싶은 문장을 입력하세요..."></textarea>
                </div>
                <div class="button-wrapper">
                    <button id="analyze-btn" class="m-btn">ANALYZE SENTIMENT</button>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2024 AI Sentiment Insight. Powered by OpenAI & Supabase.</p>
        </footer>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <h2>ANALYSIS RESULT</h2>
            </div>
            <div class="modal-body">
                <div class="result-item">
                    <span class="label">SENTIMENT</span>
                    <span id="res-sentiment" class="value">--</span>
                </div>
                <div class="result-item">
                    <span class="label">CONFIDENCE</span>
                    <div class="progress-container">
                        <div id="res-confidence-bar" class="progress-bar"></div>
                    </div>
                    <span id="res-confidence-text" class="value">0%</span>
                </div>
                <div class="result-item">
                    <span class="label">REASONING</span>
                    <p id="res-reason" class="value-text">--</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="m-btn secondary close-modal-btn">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay">
        <div class="loader"></div>
        <p>ANALYZING...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
